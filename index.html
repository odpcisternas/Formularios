<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso</title>

  <style>
    body{
      font-family: Arial;
      background:#f4f4f4;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      background:white;
      padding:40px;
      border-radius:15px;
      box-shadow:0 0 15px rgba(0,0,0,0.1);
      text-align:center;
      width:300px;
    }

    input{
      width:100%;
      padding:12px;
      margin-top:15px;
      font-size:20px;
      text-align:center;
      border-radius:10px;
      border:1px solid #ccc;
    }

    button{
      margin-top:20px;
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#222;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

    .error{
      color:red;
      margin-top:10px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Acceso privado</h2>

  <input type="password" id="pin" maxlength="6" placeholder="PIN de 6 dígitos">

  <button onclick="checkPin()">Entrar</button>

  <div class="error" id="error"></div>
</div>

<script>
function checkPin(){

  const correctPin = "364210";

  const enteredPin = document.getElementById("pin").value;

  if(enteredPin === correctPin){
      window.location.href = "menu.html";
  }else{
      document.getElementById("error").innerText = "PIN incorrecto";
  }
}
</script>

</body>
</html>
