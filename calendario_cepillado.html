<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Calendario de Cepillado</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 30px 20px;
    gap: 20px;
  }

  .controls {
    display: flex;
    gap: 14px;
    align-items: center;
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 22px;
    border-radius: 25px;
    border: none;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 3px 8px rgba(0,0,0,0.15);
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 5px 14px rgba(0,0,0,0.2); }
  .btn:active { transform: scale(0.97); }

  .btn-color {
    background: linear-gradient(135deg, #74c0fc, #f9a8d4);
    color: #1e3a5f;
  }
  .btn-bw {
    background: linear-gradient(135deg, #d1d5db, #9ca3af);
    color: #1f2937;
  }

  svg.icon {
    width: 18px; height: 18px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    flex-shrink: 0;
  }

  .page-container {
    background: white;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    border-radius: 4px;
    /* Letter ratio: 8.5 x 11 inches */
    width: 680px;
    height: 880px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .page-container img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  @media print {
    body {
      background: white;
      padding: 0;
      gap: 0;
      display: block;
    }
    .controls { display: none !important; }
    .page-container {
      width: 100%;
      height: 100vh;
      box-shadow: none;
      border-radius: 0;
      page-break-after: avoid;
    }
    @page {
      size: letter;
      margin: 0.3in;
    }
  }
</style>
</head>
